<div class="container">
  <h1>Market Data Viewer</h1>

  <div class="controls">
    <div class="control-group">
      <label for="instrument-select">Instrument:</label>
      <select id="instrument-select" [(ngModel)]="selectedInstrumentId">
        <option *ngFor="let instrument of instruments" [value]="instrument.id">{{ instrument.symbol }}</option>
      </select>
    </div>

    <div class="control-group">
      <label for="timeframe-select">Timeframe:</label>
      <select id="timeframe-select" [(ngModel)]="selectedTimeframe">
        <option *ngFor="let tf of timeframes" [value]="tf">{{ tf }}</option>
      </select>
    </div>

    <div class="control-group">
      <label for="start-date">Start Date:</label>
      <input type="date" id="start-date" [(ngModel)]="startDate">
    </div>

    <div class="control-group">
      <label for="end-date">End Date:</label>
      <input type="date" id="end-date" [(ngModel)]="endDate">
    </div>

    <div class="control-group">
      <button class="pull-button" (click)="onPullData()" [disabled]="loading">
        {{ loading ? 'Loading...' : 'Pull Data' }}
      </button>
    </div>

    <div class="control-group">
      <button
        class="sr-toggle-button"
        [class.active]="supportResistanceEnabled"
        (click)="toggleSupportResistance()">
        {{ supportResistanceEnabled ? 'S/R Lines: ON' : 'S/R Lines: OFF' }}
      </button>
    </div>
  </div>

  <div class="indicator-controls">
    <span class="indicator-label">Indicators:</span>
    <button class="indicator-btn indicator-rsi" [class.active]="indicators['rsi']" (click)="toggleIndicator('rsi')">RSI</button>
    <button class="indicator-btn indicator-vwap" [class.active]="indicators['vwap']" (click)="toggleIndicator('vwap')">VWAP</button>
    <button class="indicator-btn indicator-ma200" [class.active]="indicators['ma200']" (click)="toggleIndicator('ma200')">MA 200</button>
    <button class="indicator-btn indicator-ma20" [class.active]="indicators['ma20']" (click)="toggleIndicator('ma20')">MA 20</button>
    <button class="indicator-btn indicator-ma7" [class.active]="indicators['ma7']" (click)="toggleIndicator('ma7')">MA 7</button>
    <button class="indicator-btn indicator-bb" [class.active]="indicators['bollingerBands']" (click)="toggleIndicator('bollingerBands')">Bollinger</button>
    <button class="indicator-btn indicator-volume" [class.active]="indicators['volume']" (click)="toggleIndicator('volume')">Volume</button>
  </div>

  <div *ngIf="loading" class="loading">Loading market data...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && !error && marketData && marketData.length > 0">
    <div class="chart-header">
      <h2>{{ getSelectedSymbol() }} - {{ selectedTimeframe }} Chart</h2>
      <p class="date-range">{{ formatDateRange() }}</p>
      <p class="data-count">{{ marketData.length }} data points</p>
    </div>
    <app-chart
      [data]="marketData"
      [symbol]="getSelectedSymbol()"
      [timeframe]="selectedTimeframe"
      [supportResistanceEnabled]="supportResistanceEnabled"
      [indicators]="indicators"
      [indicatorData]="indicatorData">
    </app-chart>
  </div>

  <div *ngIf="!loading && !error && (!marketData || marketData.length === 0)">
    No market data available for the selected criteria.
  </div>
</div>
