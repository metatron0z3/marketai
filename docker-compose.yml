version: '3.8'

services:
  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"   # HTTP API port
      - "8812:8812"   # PostgreSQL wire protocol
    volumes:
      - questdb-data:/var/lib/questdb
    networks:
      - market_network

  redis:
    image: redis:7-alpine
    container_name: market_redis
    ports:
      - "6379:6379"
    networks:
      - market_network

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: market_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow
    networks:
      - market_network

  # NestJS Backend - API Gateway
  nestjs-backend:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    container_name: market_nestjs_backend
    ports:
      - "3000:3000"
    depends_on:
      - questdb
      - python-service
      - redis
    networks:
      - market_network
    environment:
      - NODE_ENV=production
      - PORT=3000
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=quest
      - QUESTDB_DATABASE=qdb
      - PYTHON_SERVICE_URL=http://python-service:8000
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - REDIS_URL=redis://redis:6379

  # Python Service - Data Ingestion & ML
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: market_python_service
    ports:
      - "8000:8000"
    volumes:
      - ./python-service/app:/app/app # Mount local app directory for development
      - model-artifacts:/app/artifacts
    depends_on:
      - questdb
      - mlflow
    networks:
      - market_network
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=9000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_ARTIFACTS_PATH=/app/artifacts
      - RISK_FREE_RATE=0.05

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: market_frontend
    ports:
      - "4200:80"
    depends_on:
      - nestjs-backend
    networks:
      - market_network

  streaming:
    build:
      context: ./streaming
      dockerfile: Dockerfile
    container_name: market_streaming
    ports:
      - "8082:8082"
    volumes:
      - ./python-service/app/models/static_data:/app/static_data
    depends_on:
      - questdb
    networks:
      - market_network

volumes:
  questdb-data:
  mlflow-data:
  model-artifacts:

networks:
  market_network:
    driver: bridge
