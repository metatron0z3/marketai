version: '3.8'

services:
  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"   # HTTP API port
      - "8812:8812"   # PostgreSQL wire protocol
    volumes:
      - questdb-data:/var/lib/questdb
    networks:
      - market_network
  
  ingest:
    build: 
      context: .
      dockerfile: Dockerfile.ingest
    container_name: market_ingest 
    volumes:
      - ./data:/src/data  # Adjust if you have data volumes
    depends_on:
      - questdb
    networks:
      - market_network

  # New Streamlit service
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: market_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./src:/src  # Mount local src directory to container
    depends_on:
      - ingest
      - questdb
    networks:
      - market_network
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=9000

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: market_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app # Mount local backend app directory for development
    depends_on:
      - questdb
    networks:
      - market_network
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=9000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: market_frontend
    ports:
      - "4200:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume to prevent host node_modules from overwriting container's
    depends_on:
      - backend
    networks:
      - market_network
    environment:
      - API_BASE_URL=http://backend:8000/api/v1


volumes:
  questdb-data:

networks:
  market_network:
    driver: bridge